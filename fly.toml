# fly.toml
app = "qinglong-panel"
primary_region = "gru"  # sin = 新加坡 hkg = 香港nrt = 东京

[build]

[env]
  TZ = "Asia/Shanghai"
  DATA_DIR = "/ql/data"
  PORT = "5700"

[http_service]
  internal_port = 5700
  force_https = true
  auto_stop_machines = false    # 不自动停机，保持运行
  auto_start_machines = true
  min_machines_running = 1      # 至少1台机器运行

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"              # 青龙面板至少需要512MB

[mounts]
  source = "ql_data"
  destination = "/ql/data"
  initial_size = 1              # 1GB持久化存储
