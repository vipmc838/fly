name: Run Modal App

# 触发条件
on:
  push:
    branches: [ main, master, modal ]   # 推送到 main、master 或 modal 分支时触发
  pull_request:
    branches: [ main, master, modal ]   # 针对这些分支的 PR 触发
  workflow_dispatch:                     # 允许手动触发

jobs:
  run-modal-app:
    runs-on: ubuntu-latest                # 运行环境：最新版 Ubuntu

    steps:
      - name: 检出代码                     # 步骤名称：检出代码
        uses: actions/checkout@v4          # 使用官方检出动作

      - name: 设置 Python 环境              # 步骤名称：设置 Python
        uses: actions/setup-python@v5      # 使用官方 Python 设置动作
        with:
          python-version: '3.11'            # 指定 Python 3.11 版本

      - name: 安装依赖                       # 步骤名称：安装依赖
        run: |
          python -m pip install --upgrade pip   # 升级 pip
          pip install modal                     # 安装 Modal 库

      - name: 运行 Modal 应用                   # 步骤名称：运行 Modal 应用
        env:
          # 从 GitHub Secrets 中读取 Modal 凭证
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: modal run app.py                    # 执行 Modal 应用的入口
