name: Deploy Modal FastAPI App

on:
#  push:
#    branches: [ main ]
  workflow_dispatch:
#  schedule:
#    - cron: '0 */6 * * *'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: modal

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install modal fastapi==0.115.12

      - name: Setup Modal token
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          modal token set --token-id "$MODAL_TOKEN_ID" --token-secret "$MODAL_TOKEN_SECRET"

      - name: Create or update Modal secrets
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          modal secret delete nezha-secrets 2>/dev/null || true
          modal secret create nezha-secrets \
            FILE_PATH="${{ secrets.FILE_PATH || '.cache' }}" \
            NEZHA_SERVER="${{ secrets.NEZHA_SERVER }}" \
            NEZHA_PORT="${{ secrets.NEZHA_PORT || '' }}" \
            NEZHA_KEY="${{ secrets.NEZHA_KEY }}" \
            UUID="${{ secrets.UUID || '' }}"
          echo "Modal secret created successfully."

      - name: Deploy to Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          echo "Deploying to Modal..."
          modal deploy app.py
          echo "Deployment complete."
