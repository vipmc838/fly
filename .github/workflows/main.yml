name: Run Modal App

on:
#  push:
#    branches: [ main ]          # 可以保留 main 或根据需要修改
  workflow_dispatch:            # 允许手动触发

jobs:
  run-modal-app:
    runs-on: ubuntu-latest

    steps:
      - name: 检出 modal 分支的代码
        uses: actions/checkout@v4
        with:
          ref: 'modal'           # 指定从 modal 分支获取 app.py

      - name: 列出文件（调试）
        run: ls -la

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install modal

      - name: 运行 Modal 应用
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          # 传递你的自定义环境变量
          FILE_PATH: ${{ secrets.FILE_PATH }}           # 可选，默认 .cache
          NEZHA_SERVER: ${{ secrets.NEZHA_SERVER }}
          NEZHA_PORT: ${{ secrets.NEZHA_PORT }}
          NEZHA_KEY: ${{ secrets.NEZHA_KEY }}
          UUID: ${{ secrets.UUID }}
        run: modal run app.py
