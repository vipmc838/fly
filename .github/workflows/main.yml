name: Run Modal App

# 触发条件可以根据需要设置，例如：
on:
  workflow_dispatch:            # 允许手动触发

jobs:
  run-modal-app:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码（使用 modal 分支）
        uses: actions/checkout@v4
        with:
          ref: 'modal'           # 指定检出 modal 分支的代码（包含 app.py）

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install modal

      - name: 运行 Modal 应用
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: modal run app.py      # 此时 app.py 来自 modal 分支
