name: Deploy Modal FastAPI App

on:
#  push:
#    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout modal branch
        uses: actions/checkout@v4
        with:
          ref: modal

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (for parsing)
        run: |
          pip install modal fastapi==0.115.0 requests psutil

      - name: Deploy to Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          FILE_PATH: ${{ secrets.FILE_PATH }}
          NEZHA_SERVER: ${{ secrets.NEZHA_SERVER }}
          NEZHA_PORT: ${{ secrets.NEZHA_PORT }}
          NEZHA_KEY: ${{ secrets.NEZHA_KEY }}
          UUID: ${{ secrets.UUID }}
        run: modal deploy app.py
