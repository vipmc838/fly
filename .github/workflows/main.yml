name: Deploy Modal FastAPI App

on:
#  push:
#    branches: [ main ]
  workflow_dispatch:
#  schedule:
#    - cron: '0 */6 * * *'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: modal  # app.py文件的分支

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install modal fastapi==0.115.12

      - name: Setup Modal token
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          modal token set --token-id "$MODAL_TOKEN_ID" --token-secret "$MODAL_TOKEN_SECRET"

      - name: Create or update Modal secrets
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          # 删除旧 secret，用 echo y 自动确认
          echo y | modal secret delete nezha-secrets 2>/dev/null || true

          # 等待删除完成
          sleep 2

          # 创建新 secret（PROJECT_URL 无需配置，会自动检测）
          modal secret create nezha-secrets \
            FILE_PATH="${{ secrets.FILE_PATH || '.cache' }}" \
            NEZHA_SERVER="${{ secrets.NEZHA_SERVER }}" \
            NEZHA_PORT="${{ secrets.NEZHA_PORT || '' }}" \
            NEZHA_KEY="${{ secrets.NEZHA_KEY }}" \
            UUID="${{ secrets.UUID || '' }}" \
            AUTO_ACCESS="${{ secrets.AUTO_ACCESS || 'true' }}" \
            KEEPALIVE_INTERVAL="${{ secrets.KEEPALIVE_INTERVAL || '120' }}"
          echo "Modal secret created successfully."

      - name: Deploy to Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          echo "Deploying to Modal..."
          modal deploy app.py
          echo "Deployment complete."

      - name: Trigger initial keepalive
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 10
          echo "Sending initial request to trigger URL auto-detection..."
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" \
            "https://boosoyz--nezha-fastapi-app-fastapi-app.modal.run/health" || true
          echo "Initial keepalive trigger complete."
